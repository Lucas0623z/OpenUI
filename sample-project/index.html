<!doctype html>
<html lang="zh">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>示例页面</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <h1 class="hero__title">欢迎来到示例站点</h1>
      <p class="hero__subtitle">用 OpenUI 选中任意元素试试改颜色、改尺寸</p>
      <button class="cta" onclick="alert('点击了按钮')">立即开始</button>
    </header>

    <main class="content">
      <section class="card">
        <h2>卡片一</h2>
        <p>这是一段示例文字，可以选中它修改字号或颜色。</p>
      </section>
      <section class="card">
        <h2>卡片二</h2>
        <p>每个元素都能在右侧面板看到源码位置与计算样式。</p>
      </section>
    </main>

    <footer class="footer">
      <span>© 2026 OpenUI Demo</span>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
